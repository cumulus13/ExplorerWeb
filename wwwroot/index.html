<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>File Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<div id="toasts"></div>

<!-- Confirm dialog -->
<div id="confirm-overlay" class="hidden">
  <div class="modal-box">
    <div class="modal-icon" id="confirm-icon">⚠️</div>
    <div class="modal-title" id="confirm-title">Are you sure?</div>
    <div class="modal-body"  id="confirm-body"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="confirm-cancel">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<!-- Rename dialog -->
<div id="rename-overlay" class="hidden">
  <div class="modal-box">
    <div class="modal-title">Rename</div>
    <div class="modal-body">Enter a new name:</div>
    <input type="text" id="rename-input" class="modal-input" autocomplete="off"/>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="rename-cancel">Cancel</button>
      <button class="btn btn-primary" id="rename-ok">Rename</button>
    </div>
  </div>
</div>

<!-- New folder dialog -->
<div id="newfolder-overlay" class="hidden">
  <div class="modal-box">
    <div class="modal-title">New Folder</div>
    <div class="modal-body">Enter folder name:</div>
    <input type="text" id="newfolder-input" class="modal-input" value="New Folder" autocomplete="off"/>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="newfolder-cancel">Cancel</button>
      <button class="btn btn-primary" id="newfolder-ok">Create</button>
    </div>
  </div>
</div>

<!-- Properties panel -->
<div id="props-overlay" class="hidden">
  <div class="modal-box props-box">
    <div class="props-icon" id="props-icon"></div>
    <div class="modal-title" id="props-name"></div>
    <div class="props-grid" id="props-grid"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="props-close">Close</button>
    </div>
  </div>
</div>

<!-- Preview panel (side panel) -->
<div id="preview-panel" class="hidden">
  <div class="preview-header">
    <span id="preview-title">Preview</span>
    <button id="preview-close" class="icon-btn-sm">✕</button>
  </div>
  <div id="preview-content"></div>
</div>

<div id="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">📁</span>
      <span class="logo-text">File Explorer</span>
    </div>

    <!-- Quick access -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">Quick Access</div>
      <button class="nav-item" data-path="" id="nav-thispc">
        <span class="nav-icon">💻</span> This PC
      </button>
      <button class="nav-item" data-path-special="desktop">
        <span class="nav-icon">🖥</span> Desktop
      </button>
      <button class="nav-item" data-path-special="documents">
        <span class="nav-icon">📄</span> Documents
      </button>
      <button class="nav-item" data-path-special="downloads">
        <span class="nav-icon">⬇</span> Downloads
      </button>
      <button class="nav-item" data-path-special="pictures">
        <span class="nav-icon">🖼</span> Pictures
      </button>
      <button class="nav-item" data-path-special="music">
        <span class="nav-icon">🎵</span> Music
      </button>
      <button class="nav-item" data-path-special="videos">
        <span class="nav-icon">🎬</span> Videos
      </button>
    </div>

    <!-- Drives -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">Drives</div>
      <div id="sidebar-drives"></div>
    </div>

    <!-- Sidebar stats -->
    <div class="sidebar-footer-stats" id="sidebar-stats">
      <div class="stat-row"><span class="stat-label">Files</span><span class="stat-val" id="stat-files">—</span></div>
      <div class="stat-row"><span class="stat-label">Folders</span><span class="stat-val" id="stat-folders">—</span></div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main" id="main">

    <!-- ── Navigation bar ── -->
    <div class="navbar">
      <div class="nav-arrows">
        <button class="icon-btn" id="btn-back"    title="Back (Alt+←)">‹</button>
        <button class="icon-btn" id="btn-forward" title="Forward (Alt+→)">›</button>
        <button class="icon-btn" id="btn-up"      title="Up (Alt+↑)">↑</button>
        <button class="icon-btn" id="btn-refresh" title="Refresh (F5)">↻</button>
      </div>

      <!-- Address bar + breadcrumbs -->
      <div class="address-bar" id="address-bar">
        <div class="breadcrumbs" id="breadcrumbs"></div>
        <input type="text" id="address-input" class="address-input hidden" autocomplete="off" spellcheck="false"/>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" class="search-input" placeholder="Search…" autocomplete="off"/>
        <button class="search-clear hidden" id="search-clear">✕</button>
      </div>
    </div>

    <!-- ── Toolbar ── -->
    <div class="toolbar">
      <div class="toolbar-left">
        <!-- File ops (shown when items selected) -->
        <div id="selection-tools" class="hidden">
          <span class="selection-count" id="sel-count">0 selected</span>
          <button class="btn btn-sm btn-ghost" id="btn-copy-sel" title="Copy">📋 Copy</button>
          <button class="btn btn-sm btn-ghost" id="btn-cut-sel" title="Cut">✂ Cut</button>
          <button class="btn btn-sm btn-ghost" id="btn-rename-sel" title="Rename (F2)">✏ Rename</button>
          <button class="btn btn-sm btn-ghost" id="btn-props-sel" title="Properties (Alt+Enter)">ℹ Props</button>
          <button class="btn btn-sm btn-danger" id="btn-delete-sel" title="Delete (Del)">🗑 Delete</button>
          <button class="btn btn-sm btn-ghost" id="btn-deselect" title="Deselect all">✕</button>
        </div>

        <!-- Always-visible ops -->
        <div id="general-tools">
          <button class="btn btn-sm btn-ghost" id="btn-newfolder" title="New Folder">📁+ New Folder</button>
          <button class="btn btn-sm btn-ghost" id="btn-paste" title="Paste (Ctrl+V)" id="btn-paste">📋 Paste</button>
        </div>
      </div>

      <div class="toolbar-right">
        <!-- Show hidden toggle -->
        <label class="toggle-label" title="Show hidden files">
          <input type="checkbox" id="chk-hidden" checked/>
          <span>Hidden</span>
        </label>

        <!-- Sort -->
        <select class="sort-select" id="sort-select">
          <option value="name-asc">Name A–Z</option>
          <option value="name-desc">Name Z–A</option>
          <option value="modified-desc">Date ↓</option>
          <option value="modified-asc">Date ↑</option>
          <option value="size-desc">Size ↓</option>
          <option value="size-asc">Size ↑</option>
          <option value="type-asc">Type</option>
        </select>

        <!-- View toggle -->
        <div class="view-toggle">
          <button class="view-btn active" id="view-list"    title="Details">☰</button>
          <button class="view-btn"        id="view-grid"    title="Grid">⊞</button>
          <button class="view-btn"        id="view-compact" title="Compact">▤</button>
        </div>

        <!-- Preview toggle -->
        <button class="icon-btn" id="btn-preview-toggle" title="Toggle preview pane">👁</button>
      </div>
    </div>

    <!-- Column headers (list view) -->
    <div class="list-header" id="list-header">
      <div class="col-chk"><input type="checkbox" id="chk-all" title="Select all"/></div>
      <div class="col-icon"></div>
      <div class="col-name sortable" data-col="name">Name</div>
      <div class="col-date sortable" data-col="modified">Date modified</div>
      <div class="col-type sortable" data-col="type">Type</div>
      <div class="col-size sortable" data-col="size">Size</div>
    </div>

    <!-- File container -->
    <div class="file-container list-view" id="file-container">
      <div class="loading-state" id="loading-state">
        <div class="spinner-large"></div>
        <p>Loading…</p>
      </div>
    </div>

    <!-- Status bar -->
    <div class="statusbar">
      <span id="status-text">Ready</span>
      <span class="status-right" id="status-right"></span>
    </div>

  </main>
</div>

<script src="/js/icons.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
